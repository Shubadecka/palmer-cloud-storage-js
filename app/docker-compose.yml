# Frontend only — pull image from Docker Hub.
# Expects API on host port 1442 by default (or set API_UPSTREAM).
# From this directory:
#   docker compose pull
#   docker compose up -d

services:
  web:
    image: shubadecka/genealogical-journal-assistant-frontend:v1.0.1
    ports:
      - "${FRONTEND_PORT:-1457}:80"
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-host.docker.internal:1442}
    extra_hosts:
      - "host.docker.internal:host-gateway"
